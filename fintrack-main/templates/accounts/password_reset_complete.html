{% extends 'base.html' %}
{% load static %}

{% block title %}FinTrack - Password Reset Complete{% endblock %}

{% block extra_css %}
<link href="{% static 'css/auth.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <!-- Logo Header -->
        <div class="auth-logo-box bg-success">
            <i class="fa-solid fa-circle-check text-white"></i>
        </div>
        <h2 class="auth-title mt-3">Reset Complete</h2>
        <p class="auth-subtitle">Your password has been successfully reset. You may now sign in using your new credentials.</p>

        <!-- Login Button -->
        <a href="{% url 'login' %}" class="btn btn-auth-primary mt-3">
            Sign In <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>
</div>
{% endblock %}
